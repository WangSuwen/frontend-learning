<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终极拟物玻璃态 UI 预览</title>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础背景设置：使用与原图一致的冷蓝色调渐变 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #7089a6 0%, #3e5675 50%, #1d2d41 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }

        /* 控制面板主容器 */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 30px;
            padding: 40px;
        }

        /* ==================== 1. 顶部大玻璃底板 ==================== */
        .glass-panel {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 25px;
            /* 物理投影、顶部极细高光边、底部厚度感暗边 */
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.5),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            justify-items: center;
        }

        /* ==================== 2. 【核心】拟物化球形玻璃按钮 ==================== */
        .glass-sphere {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease-out;
            
            /* 通用球体阴影：让按钮“浮”起来 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden; /* 裁剪伪元素高光 */
        }

        /* --- 深色球体 (Wi-Fi, 交换) --- */
        .sphere-dark {
            /* 核心：多重径向渐变模拟球体受光面 */
            background: 
                /* 左上角超亮环境光 */
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 40%),
                /* 本体颜色渐变 */
                radial-gradient(circle at 50% 50%, #2a2d32 0%, #111315 100%);
            
            /* 极细的外部亮边，增加剔透感 */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- 浅色球体 (飞机, 蓝牙) --- */
        .sphere-white {
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 50%),
                radial-gradient(circle at 50% 50%, #ffffff 0%, #e0e8f5 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* ==================== 3. 【灵魂】凌厉高光层 ==================== */
        /* 使用伪元素在球体顶部叠加一层极其锐利的月牙形反光 */
        .glass-sphere::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 15%;
            width: 70%;
            height: 40%;
            /* 极其锋利的白色渐变，模拟玻璃表面对光源的直接反射 */
            background: linear-gradient(to bottom, 
                rgba(255, 255, 255, 0.7) 0%, 
                rgba(255, 255, 255, 0.1) 80%, 
                rgba(255, 255, 255, 0) 100%);
            border-radius: 50% 50% 45% 45% / 80% 80% 20% 20%;
            filter: blur(0.5px); /* 几乎不加模糊，保持凌厉 */
            pointer-events: none;
        }

        /* 浅色球体的高光需要稍弱一点，否则会糊 */
        .sphere-white::after {
            background: linear-gradient(to bottom, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(255, 255, 255, 0.2) 80%, 
                rgba(255, 255, 255, 0) 100%);
        }

        /* 图标样式 */
        .glass-sphere i {
            font-size: 24px;
            z-index: 1; /* 保证图标在渐变底色之上 */
            position: relative;
        }

        .sphere-dark i {
            color: #ffffff;
            /* 给图标加一点微弱的阴影，增加立体感 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sphere-white i {
            color: #1d2d41;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        /* 点击反馈 */
        .glass-sphere:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* ==================== 4. 垂直胶囊滑块 (亮度) ==================== */
        .capsule-slider {
            grid-row: span 2;
            width: 75px;
            height: 180px;
            /* 上部透明，下部实色 */
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 50%, #ffffff 50%);
            border-radius: 40px;
            position: relative;
            justify-self: center;
            overflow: hidden;
            
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 2px rgba(255, 255, 255, 0.5),
                inset 0 -3px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 25px;
            box-sizing: border-box;
        }

        /* 滑块顶部的独立弧形高光 */
        .capsule-slider::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 15px;
            width: 45px;
            height: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            pointer-events: none;
        }

        .capsule-slider i {
            font-size: 26px;
            color: #1d2d41;
            z-index: 1;
        }

        /* ==================== 5. 带有外层玻璃圈的按钮 ==================== */
        .ring-btn-container {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            justify-self: center;
            align-self: center;
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        /* 缩小版的球体按钮，放入圈中 */
        .ring-btn-container .glass-sphere {
            width: 60px;
            height: 60px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .ring-btn-container .glass-sphere i {
            font-size: 20px;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- 顶部组件 -->
        <div class="glass-panel">
            <div class="glass-sphere sphere-white">
                <i class="fa-solid fa-plane"></i>
            </div>
            <div class="glass-sphere sphere-dark">
                <i class="fa-solid fa-arrows-up-down"></i>
            </div>
            <div class="glass-sphere sphere-dark">
                <i class="fa-solid fa-wifi"></i>
            </div>
            <div class="glass-sphere sphere-white">
                <i class="fa-solid fa-bluetooth-b"></i>
            </div>
        </div>

        <!-- 亮度滑块 -->
        <div class="capsule-slider">
            <i class="fa-solid fa-sun"></i>
        </div>

        <!-- 带有玻璃圈的组件示例 -->
        <div class="ring-btn-container">
            <div class="glass-sphere sphere-dark">
                <i class="fa-solid fa-bell-slash"></i>
            </div>
        </div>
        
        <div class="ring-btn-container">
            <div class="glass-sphere sphere-white">
                <i class="fa-solid fa-camera"></i>
            </div>
        </div>

        <div class="ring-btn-container">
            <div class="glass-sphere sphere-dark">
                <i class="fa-solid fa-calculator"></i>
            </div>
        </div>
    </div>

</body>
</html>
